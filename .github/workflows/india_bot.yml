name: NIFTY/BANKNIFTY Paper Trading Bot

on:
  schedule:
    # 9:20 AM IST = 3:50 AM UTC
    - cron: "50 3 * * 1-5"   # Mon–Fri at 03:50 UTC (9:20 AM IST)

  workflow_dispatch:           # Allow manual trigger from GitHub UI

jobs:
  run-india-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Create logs directory ──────────────────────────────────────────
      - name: Prepare directories
        run: mkdir -p logs

      # ── 5. Run the India trading bot ──────────────────────────────────────
      - name: Run India trading bot
        run: python india_bot.py

      # ── 6. Commit updated journal & logs back to repo ─────────────────────
      - name: Commit journal and logs
        run: |
          git config user.name  "India Trading Bot"
          git config user.email "bot@noreply.github.com"
          git add trading_journal.xlsx logs/india_bot.log || true
          git diff --staged --quiet || git commit -m "📊 India trades update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
