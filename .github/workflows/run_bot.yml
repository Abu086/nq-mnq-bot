name: NQ/MNQ Paper Trading Bot

on:
  schedule:
    # 10:00 AM ET = 15:00 UTC (during EDT, Mar–Nov)
    # 10:00 AM ET = 15:00 UTC (during EST, Nov–Mar = 15:00 UTC)
    # Using 15:00 UTC covers both EDT and EST within 1hr window
    - cron: "0 15 * * 1-5"   # Mon–Fri at 15:00 UTC (10:00 ET)

  workflow_dispatch:           # Allow manual trigger from GitHub UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # ── 3. Install dependencies ───────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Create logs directory ──────────────────────────────────────────
      - name: Prepare directories
        run: mkdir -p logs

      # ── 5. Run the trading bot ────────────────────────────────────────────
      - name: Run trading bot
        run: python trading_bot.py

      # ── 6. Commit updated journal & logs back to repo ─────────────────────
      - name: Commit journal and logs
        run: |
          git config user.name  "Trading Bot"
          git config user.email "bot@noreply.github.com"
          git add trading_journal.xlsx logs/bot.log || true
          git diff --staged --quiet || git commit -m "📊 Auto-update journal $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
